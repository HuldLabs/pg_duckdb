# =============================================================================
# Build pg_duckdb — cross-compiled for Celeron J4125 (x86-64-v2)
# =============================================================================
# Target: Celeron J4125 — no AVX/AVX2/FMA, only SSE4.2 (x86-64-v2).
# Trigger: manual only (workflow_dispatch) — never auto-runs.
#
# Usage:
#   1. gh workflow run build.yml -f pg_version=18
#   2. Download artifact (pg_duckdb-*.tar.gz)
#   3. SCP to J4125 and install:
#        tar xzf pg_duckdb-*.tar.gz
#        sudo cp pg_duckdb.so $(pg_config --pkglibdir)/
#        sudo cp pg_duckdb.control $(pg_config --sharedir)/extension/
#        sudo cp sql/*.sql $(pg_config --sharedir)/extension/
#        echo "shared_preload_libraries = 'pg_duckdb'" >> /etc/postgresql/18/main/postgresql.conf
#        sudo systemctl restart postgresql@18-main
# =============================================================================

name: Build pg_duckdb

on:
  workflow_dispatch:
    inputs:
      pg_version:
        description: 'PostgreSQL major version'
        required: true
        default: '18'
        type: choice
        options:
          - '16'
          - '17'
          - '18'
      build_type:
        description: 'Build type (Release / Debug / ReleaseStatic)'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
          - ReleaseStatic

concurrency:
  group: pg-duckdb-build-${{ github.ref_name }}
  cancel-in-progress: true

env:
  PG_VERSION: ${{ inputs.pg_version || '18' }}
  DUCKDB_BUILD: ${{ inputs.build_type || 'Release' }}
  # Cross-compile flags: arch x86-64-v2, no AVX/AVX2/FMA
  ARCH_CFLAGS: -march=x86-64-v2 -mno-avx -mno-avx2 -mno-fma -mtune=generic
  ARCH_CXXFLAGS: -march=x86-64-v2 -mno-avx -mno-avx2 -mno-fma -mtune=generic

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check runner CPU
        run: |
            echo "Runner:" && uname -m
            grep -E 'model name|flags' /proc/cpuinfo | head -3

      # ──────────────────────────────────────────────
      #   System dependencies
      # ──────────────────────────────────────────────
      - name: Add PostgreSQL APT repo
        run: |
            sudo install -d /usr/share/postgresql-common/pgdg
            sudo curl -sS -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
              https://www.postgresql.org/media/keys/ACCC4CF8.asc
            source /etc/os-release
            echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
              https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
              | sudo tee /etc/apt/sources.list.d/pgdg.list
            sudo apt-get update -qq

      - name: Install build deps
        run: |
            sudo apt-get install -y -qq --no-install-recommends \
              build-essential git cmake ninja-build pkg-config \
              libssl-dev libreadline-dev zlib1g-dev \
              libcurl4-openssl-dev liblz4-dev libpq-dev \
              postgresql-${{ env.PG_VERSION }} \
              postgresql-server-dev-${{ env.PG_VERSION }}

      - name: Verify pg_config
        run: pg_config --version

      # ──────────────────────────────────────────────
      #   Checkout repo (self)
      # ──────────────────────────────────────────────
      - name: Checkout pg_duckdb
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # ──────────────────────────────────────────────
      #   Build
      # ──────────────────────────────────────────────
      - name: Build pg_duckdb extension
        run: |
            export PG_CFLAGS="${{ env.ARCH_CFLAGS }}"
            export PG_CXXFLAGS="${{ env.ARCH_CXXFLAGS }}"
            export CFLAGS="${{ env.ARCH_CFLAGS }}"
            export CXXFLAGS="${{ env.ARCH_CXXFLAGS }}"
            # Inject arch flags into DuckDB cmake build as well
            export CMAKE_VARS="-DCXX_EXTRA=-fvisibility=default \
              -DBUILD_SHELL=0 -DBUILD_PYTHON=0 -DBUILD_UNITTESTS=0 \
              -DCMAKE_C_FLAGS="${{ env.ARCH_CFLAGS }}" \
              -DCMAKE_CXX_FLAGS="${{ env.ARCH_CXXFLAGS }}""

            echo "=== Building with ==="
            echo "PG_CFLAGS=$PG_CFLAGS"
            echo "PG_CXXFLAGS=$PG_CXXFLAGS"
            echo "CMAKE_VARS=$CMAKE_VARS"
            echo "DUCKDB_BUILD=$DUCKDB_BUILD"

            make -j$(nproc) 2>&1

      - name: List build artifacts
        run: |
            echo "=== Shared objects ==="
            find . -name '*.so' -ls
            echo "=== Control files ==="
            find . -name '*.control' -ls
            echo "=== SQL files ==="
            find sql/ -name '*.sql' -ls 2>/dev/null || true

      # ──────────────────────────────────────────────
      #   Package artifact
      # ──────────────────────────────────────────────
      - name: Prepare artifact
        run: |
            ARTIFACT="pg_duckdb-pg${{ env.PG_VERSION }}"
            mkdir -p /tmp/$ARTIFACT

            # .so
            SO_FILE=$(find . -name 'pg_duckdb.so' -type f | head -1)
            if [ -n "$SO_FILE" ]; then
              cp "$SO_FILE" /tmp/$ARTIFACT/
              echo "✅ Copied: $SO_FILE ($(stat -c%s "$SO_FILE") bytes)"
            else
              echo "⚠️  No pg_duckdb.so found"
              find . -name '*.so' -type f | head -10
            fi

            # .control
            cp pg_duckdb.control /tmp/$ARTIFACT/ 2>/dev/null || true

            # SQL
            mkdir -p /tmp/$ARTIFACT/sql
            cp sql/pg_duckdb--*.sql /tmp/$ARTIFACT/sql/ 2>/dev/null || true

            # Build metadata
            cat > /tmp/$ARTIFACT/BUILD_INFO.txt <<EOF
            pg_duckdb build artifact
            Repo:     ${{ github.repository }}
            Ref:      ${{ github.ref_name }} (${{ github.sha }})
            Built:    $(date -u +%Y-%m-%dT%H:%M:%SZ)
            Runner:   $(uname -m)
            PG:       ${{ env.PG_VERSION }}
            Build:    ${{ env.DUCKDB_BUILD }}
            CFLAGS:   ${{ env.ARCH_CFLAGS }}
            CXXFLAGS: ${{ env.ARCH_CXXFLAGS }}
            EOF

            echo ""
            echo "=== Artifact tree ==="
            find /tmp/$ARTIFACT -type f -ls

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pg_duckdb-pg${{ env.PG_VERSION }}
          path: /tmp/pg_duckdb-pg${{ env.PG_VERSION }}/
          retention-days: 30
          if-no-files-found: error
